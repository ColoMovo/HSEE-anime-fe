name: Render Remotion Video

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: remotion/yarn.lock

      - name: Install Remotion dependencies
        run: |
          cd remotion
          yarn install --frozen-lockfile

      - name: Start preview server in background
        run: |
          npm start &
          sleep 5

      - name: Render Video with Remotion
        run: |
          cd remotion
          node node_modules/@remotion/cli/remotion-cli.js render Root.tsx gaokao-video --output=../out.mp4 --concurrency=2

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotion-video
          path: out.mp4
