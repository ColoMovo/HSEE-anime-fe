name: Render Remotion Video

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies for Headless Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Install local root dependencies
        run: npm install

      - name: Install Remotion dependencies
        run: |
          cd remotion
          npm install

      - name: Start preview server in background
        run: |
          npm start &
          sleep 5

      - name: Render Video with Remotion
        run: |
          cd remotion
          npx remotion render Root.tsx gaokao-video --output=../out.mp4 --concurrency=4

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotion-video
          path: out.mp4
